<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="formstyle.css">
</head>
<body>
    <form action="">
        <div class="container">
            <h1>Đăng Ký</h1>
        <div>
            Tên Đăng nhập: <br>
            <input type="text" placeholder="Nhập tên đăng nhập" id="LoginName">
            <div class="error-message" id="NameErrorMessage"></div>
        </div>
        <div>
            Email: <br>
            <input type="text" placeholder="Nhập địa chỉ email" id="LoginEmail">
            <div class="error-message" id="EmailErrorMessage" id="email"></div>
        </div>
        <div>
            Mật khẩu: <br>
            <input type="password" placeholder="Nhập mật khẩu (ít nhất 6 ký tự)" id="LoginPassword">
            <div class="error-message" id="PasswordErrorMessage"></div>
        </div>
        <div>
            Nhập lại mật khẩu: <br>
            <input type="password" placeholder="Nhập lại mật khẩu" id="ReLoginPassword">
            <div class="error-message" id="RePasswordErrorMessage"></div>
        </div>
        <input type="button" value="Đăng ký" onclick="validateForm()">
        </div>
    </form>
    <script>
        function validateForm(){
            var name= LoginName.value.trim();
            var email = LoginEmail.value.trim();
            var pass = LoginPassword.value.trim();
            var repass=ReLoginPassword.value.trim();
            var isValid =true;

            if (name === ''||isNaN(name)==false) {
                NameErrorMessage.textContent = 'Vui lòng nhập tên tài khoản của bạn';
                isValid = false;
            } else {
                NameErrorMessage.textContent = '';
            }

            if(!validateEmail(email)){
                EmailErrorMessage.textContent='Vui lòng nhập email của bạn';
                isValid=false;
            }else{
                EmailErrorMessage.textContent='';
            }

            if(pass===''){
                PasswordErrorMessage.textContent='Vui lòng nhập mật khẩu tài khoản của bạn'
                isValid=false;
            }else{
                PasswordErrorMessage.textContent='';
            }

            if(repass===''){
                RePasswordErrorMessage.textContent='Vui lòng nhập lại mật khẩu tài khoản của bạn';
                isValid=false;
            }else{
                RePasswordErrorMessage.textContent='';
            }

            if(isValid){
                alert("Đăng ký thành công !")
            }

        }
        function validateEmail(email) {
            var emailRegex = /\S+@\S+\.\S+/;
            return emailRegex.test(email);
        }

        var pn=numInput.value.trim();
        function validatePhoneNumber(pn){
            var pnRegex=/^0\d{9}$/;
            return pnRegex.test(pn);
        }
    </script>
</body>
</html>
